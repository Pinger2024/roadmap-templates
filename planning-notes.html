<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Planning Notes</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1d1d2e; line-height: 1.5; margin: 0; background: #f4f5f8; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 64px; }
  .lockbox { background: #fff; border: 1px solid #e2e4ec; border-radius: 12px; padding: 40px 32px; max-width: 420px; margin: 80px auto; text-align: center; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
  .lockbox h2 { margin: 0 0 8px; color: #1d1d4d; }
  .lockbox p { color: #6b6f80; font-size: 14px; margin: 0 0 18px; }
  .lockbox input { width: 100%; box-sizing: border-box; padding: 13px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; text-align: center; margin-bottom: 14px; }
  .lockbox .unlock { background: #1d1d4d; color: #fff; border: none; padding: 13px 28px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; }
  .lockbox .unlock:hover { background: #2a2a6a; }
  .err { color: #e53e3e; font-size: 13px; display: none; margin: 0 0 12px !important; }
  header { background: #1d1d4d; color: #fff; padding: 24px 28px; border-radius: 10px; }
  header h1 { margin: 0 0 6px; font-size: 20px; }
  header .sub { font-size: 13px; opacity: 0.85; }
  .howto { background: #fff; border: 1px solid #e2e4ec; border-radius: 10px; padding: 14px 20px; margin: 18px 0; font-size: 13.5px; }
  .howto b { color: #1d1d4d; }
  .decision { background: #fff8e6; border: 1px solid #f0d484; border-radius: 10px; padding: 14px 18px; margin: 16px 0; font-size: 13.5px; }
  .decision strong { color: #8a6a00; }
  .group h2 { font-size: 15px; color: #1d1d4d; margin: 26px 0 10px; border-bottom: 2px solid #1d1d4d; padding-bottom: 6px; }
  .card { background: #fff; border: 1px solid #e2e4ec; border-radius: 10px; padding: 16px 18px; margin: 12px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .badges { margin-bottom: 10px; }
  .pill { display: inline-block; font-size: 10.5px; font-weight: 600; padding: 2px 9px; border-radius: 20px; margin-right: 6px; }
  .new { background: #e3f1e6; color: #246b34; }
  .have { background: #e6ecf5; color: #2a4a7a; }
  .dep { background: #fbe6e6; color: #9a2a2a; }
  .owner { font-size: 11px; color: #6b6f80; }
  .field { margin: 10px 0 0; }
  .flabel { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
  .box { background: #f7f8fb; border: 1px solid #e6e8ef; border-radius: 6px; padding: 9px 12px; font-size: 13.5px; }
  .box.summary { font-weight: 600; }
  .cp { font-size: 11px; font-weight: 600; color: #1d1d4d; background: #eceef4; border: 1px solid #d7dae4; border-radius: 5px; padding: 3px 10px; cursor: pointer; }
  .cp:hover { background: #e2e5ee; }
  .cp.done { background: #246b34; color: #fff; border-color: #246b34; }
  footer { font-size: 12px; color: #8b8f9e; margin-top: 30px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">

  <div id="lock" class="lockbox">
    <h2>Planning Notes</h2>
    <p>Enter the passphrase to view.</p>
    <input type="password" id="pp" placeholder="Passphrase" onkeypress="if(event.key==='Enter')unlock()">
    <p id="err" class="err">Incorrect passphrase</p>
    <button class="unlock" onclick="unlock()">Unlock</button>
  </div>

  <div id="content" style="display:none;"></div>

</div>

  function b64ToBytes(b64){
    var bin = atob(b64), a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return a;
  }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function unlock(){
    var pass = document.getElementById('pp').value;
    var err = document.getElementById('err');
    err.style.display = 'none';
    try {
      var enc = new TextEncoder();
      var km = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
      var key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(PAYLOAD.salt), iterations: 200000, hash: 'SHA-256' },
        km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(PAYLOAD.iv) }, key, b64ToBytes(PAYLOAD.data));
      var obj = JSON.parse(new TextDecoder().decode(plain));
      render(obj);
      document.getElementById('lock').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch (e) {
      err.style.display = 'block';
    }
  }

  var idc = 0;
  function render(obj){
    var h = '';
    h += '<header><h1>System and Brochure Change</h1><div class="sub">Ticket paste sheet</div></header>';
    h += '<div class="howto"><b>How to use:</b> click Copy on the Summary and paste into the Jira summary field, then Copy the Description into the description. Owner and type are for your reference, leave them out of the ticket.</div>';
    h += '<div class="decision"><strong>Key open decision first:</strong> how VMO and PT read the file. Load into a database and refresh daily, or read straight off the share. Settle it before the rest.</div>';
    obj.groups.forEach(function(g){
      h += '<div class="group"><h2>' + esc(g.name) + '</h2>';
      g.tickets.forEach(function(t){
        idc++; var sid = 's' + idc, did = 'd' + idc;
        var pc = t.type === 'NEW' ? 'new' : (t.type === 'DEPENDENCY' ? 'dep' : 'have');
        h += '<div class="card"><div class="badges"><span class="pill ' + pc + '">' + t.type + '</span><span class="owner">Owner: ' + esc(t.owner) + '</span></div>';
        h += '<div class="field"><div class="flabel">Summary <button class="cp" data-label="Copy" onclick="copyEl(this,\'' + sid + '\')">Copy</button></div><div class="box summary" id="' + sid + '">' + esc(t.summary) + '</div></div>';
        h += '<div class="field"><div class="flabel">Description <button class="cp" data-label="Copy" onclick="copyEl(this,\'' + did + '\')">Copy</button></div><div class="box" id="' + did + '">' + esc(t.description) + '</div></div>';
        h += '</div>';
      });
      h += '</div>';
    });
    h += '<footer>Working paste sheet &middot; not yet in Jira (NBS UI, manual creation)</footer>';
    document.getElementById('content').innerHTML = h;
  }

  function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
  function flash(btn){
    btn.textContent = 'Copied'; btn.classList.add('done');
    setTimeout(function(){ btn.textContent = btn.getAttribute('data-label'); btn.classList.remove('done'); }, 1200);
  }
  function copyEl(btn, id){
    var text = document.getElementById(id).innerText.trim();
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ flash(btn); }, function(){ fallbackCopy(text); flash(btn); });
    } else { fallbackCopy(text); flash(btn); }
  }
</script>
</body>
</html>
